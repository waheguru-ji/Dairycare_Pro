<!DOCTYPE html>
<html lang="pa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ਸਹਿਯੋਗ / Donate - DairyCare Pro</title>
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        .donate-container {
            max-width: 600px;
            margin: 2rem auto;
            text-align: center;
            padding: 1.5rem 1rem;
            width: 90%;
        }

        .donate-qr {
            width: 220px;
            height: 220px;
            margin: 1.5rem auto;
            border: 3px solid #2a9d8f;
            border-radius: 24px;
            padding: 12px;
            background: white;
            box-shadow: 0 8px 24px rgba(42, 157, 143, 0.15);
        }

        .donate-qr img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        .donate-btn {
            display: inline-block;
            background: #2a9d8f;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            margin: 20px 0;
        }

        .humble-text {
            font-size: 1.1rem;
            line-height: 1.8;
            background: #e9f5ef;
            padding: 1rem;
            border-radius: 20px;
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>
    <main class="container donate-container">
        <h1>❤️ ਸਹਿਯੋਗ (Donate / Support)</h1>
        <div class="humble-text">
            <p>ਜੇਕਰ ਇਹ ਐਪ ਤੁਹਾਡੇ ਰੋਜ਼ਾਨਾ ਡੇਅਰੀ ਕੰਮ ਵਿੱਚ ਥੋੜ੍ਹੀ ਵੀ ਮਦਦ ਕਰਦੀ ਹੈ, ਤਾਂ ਤੁਸੀਂ ਆਪਣੀ ਮਰਜ਼ੀ ਨਾਲ ਥੋੜ੍ਹਾ ਜਿਹਾ
                ਸਹਿਯੋਗ ਕਰ ਸਕਦੇ ਹੋ।</p>
            <p>ਇਹ ਸਿਰਫ਼ ਤੁਹਾਡੀ ਖੁਸ਼ੀ ਅਤੇ ਸ਼ੁਕਰੀਆ ਲਈ ਹੈ — **ਕੋਈ ਪਾਬੰਦੀ ਨਹੀਂ, ਕੋਈ ਜ਼ਰੂਰਤ ਨਹੀਂ।**</p>
            <p>ਤੁਹਾਡੇ ਦੁਆਰਾ ਭੇਜੀ ਗਈ ਹਰ ਰਕਮ ਸਾਡੇ ਲਈ ਹੌਸਲਾ ਹੈ।</p>
        </div>

        <!-- QR Code Image (replace path with your actual QR) -->
        <div class="donate-qr">
            <img src="/assets/images/upi-qr.png" alt="UPI QR Code">
        </div>

        <p style="margin-top: 30px;">ਧੰਨਵਾਦ! 🙏</p>
    </main>
    <div id="footer-placeholder"></div>
    <script src="../assets/script.js"></script>
    <script src="../assets/dashboard.js"></script>
</body>

</html>
